name: Formatting
on:
  pull_request:
permissions:
  contents: read
jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.0
      - uses: actions/setup-node@v6.2.0
        with:
          node-version: 24
      - run: |
          yarn
          yarn prettier . --check
